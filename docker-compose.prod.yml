services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: logger
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d logger"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./FoolOfRESTAPI
    environment:
      - POSTGRES_CONNECTION_STRING=${POSTGRES_CONNECTION_STRING}
      - APIKEY=${APIKEY}
      - TOKEN=${TOKEN}
      - CONNECTION_STRING=${CONNECTION_STRING}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5001:5001"

  web:
    build:
      context: ./FoolOfRESTWeb
    environment:
      - API_URL=http://api:5001/
      - APIKEY=${APIKEY}
    depends_on:
      - api
    ports:
      - "5002:5002"
    labels:
      - traefik.enable=true
      - traefik.http.services.web.loadbalancer.server.port=5002

volumes:
  pgdata:
